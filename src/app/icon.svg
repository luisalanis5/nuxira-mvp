<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Fondo oscuro clásico Dark Mode -->
    <rect width="100" height="100" rx="24" fill="#050505" />
    
    <!-- Letra N estilizada y nítida -->
    <path 
        d="M 24 72 L 24 28 L 48 72 L 48 28" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="12" 
        stroke-linejoin="miter"
        stroke-linecap="square"
    />
    
    <!-- Letra X en color neón -->
    <path 
        d="M 54 28 L 76 72 M 76 28 L 54 72" 
        fill="none" 
        stroke="#c2cdff" 
        stroke-width="12" 
        stroke-linecap="square"
    />
</svg>
